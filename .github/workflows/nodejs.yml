name: Node CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - develop
      - "feature/*"
      - "maintain/*"
      - "shinyoshiaki/*"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: prepare
        run: |
          sudo apt-get update
          sudo apt-get -y install libavdevice-dev libavfilter-dev libopus-dev libvpx-dev pkg-config libsrtp2-dev libasound2-dev libgstreamer1.0-0 gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-pulseaudio
          npm i
          cd e2e
          npm i
          npx playwright install chromium
          cd ../
      - name: Start TURNS server (pion/turn TLS)
        run: |
          cd packages/ice/docker/pion-turn-tls
          docker compose up -d --build
          for i in $(seq 1 30); do
            if nc -z 127.0.0.1 5349 2>/dev/null; then
              echo "TURNS server ready"
              break
            fi
            echo "Waiting for TURNS server... ($i/30)"
            sleep 1
          done
      - name: test
        env:
          CI: true
          TURNS_TEST_HOST: "127.0.0.1"
          TURNS_TEST_PORT: "5349"
          TURNS_TEST_USER: "username"
          TURNS_TEST_PASS: "password"
        run: |
          npm run test
      - name: Stop TURNS server
        if: always()
        run: |
          cd packages/ice/docker/pion-turn-tls
          docker compose down || true
